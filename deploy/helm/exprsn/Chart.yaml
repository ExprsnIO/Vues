apiVersion: v2
name: exprsn
description: A Helm chart for deploying Exprsn video platform
type: application
version: 0.1.0
appVersion: "1.0.0"
keywords:
  - video
  - social
  - federation
  - atproto
maintainers:
  - name: Exprsn Team
    email: team@exprsn.app
home: https://exprsn.app
sources:
  - https://github.com/exprsn/exprsn
dependencies:
  - name: redis
    version: "18.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: postgresql
    version: "13.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
