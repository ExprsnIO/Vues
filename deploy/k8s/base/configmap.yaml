# Exprsn ConfigMaps
apiVersion: v1
kind: ConfigMap
metadata:
  name: exprsn-config
  namespace: exprsn
data:
  # S3/Object Storage
  s3-endpoint: "https://s3.amazonaws.com"
  s3-bucket: "exprsn-production"
  s3-region: "us-east-1"

  # Service URLs
  api-url: "https://api.exprsn.app"
  web-url: "https://exprsn.app"
  pds-url: "https://pds.exprsn.app"
  relay-url: "https://relay.exprsn.app"

  # Feature Flags
  federation-enabled: "true"
  moderation-enabled: "true"
  ai-moderation-enabled: "true"

  # Logging
  log-level: "info"
  log-format: "json"

  # Rate Limiting
  rate-limit-enabled: "true"
  rate-limit-default: "1000"

  # Cache TTLs
  feed-cache-ttl: "60"
  user-cache-ttl: "300"
  video-cache-ttl: "3600"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: exprsn
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
              - alertmanager:9093

    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__

      - job_name: 'exprsn-api'
        static_configs:
          - targets: ['exprsn-api:3000']
        metrics_path: /metrics

      - job_name: 'exprsn-render-worker'
        static_configs:
          - targets: ['exprsn-render-worker:3100']
        metrics_path: /metrics
