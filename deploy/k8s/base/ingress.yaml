# Exprsn Ingress Configuration
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: exprsn-ingress
  namespace: exprsn
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "500m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "1000"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
    - hosts:
        - exprsn.app
        - api.exprsn.app
        - "*.exprsn.app"
      secretName: exprsn-tls
  rules:
    - host: exprsn.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: exprsn-web
                port:
                  number: 3000
    - host: api.exprsn.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: exprsn-api
                port:
                  number: 3000
---
# Ingress for PDS federation endpoints
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: exprsn-federation-ingress
  namespace: exprsn
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - pds.exprsn.app
        - relay.exprsn.app
      secretName: exprsn-federation-tls
  rules:
    - host: pds.exprsn.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: exprsn-pds
                port:
                  number: 2583
    - host: relay.exprsn.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: exprsn-relay
                port:
                  number: 2584
