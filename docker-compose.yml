services:
  postgres:
    image: postgres:16-alpine
    container_name: exprsn-postgres
    environment:
      POSTGRES_USER: exprsn
      POSTGRES_PASSWORD: exprsn_dev
      POSTGRES_DB: exprsn
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exprsn"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: exprsn-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.17.0
    container_name: exprsn-opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Admin_123!
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.17.0
    container_name: exprsn-opensearch-dashboards
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    container_name: exprsn-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/exprsn-uploads --ignore-existing;
      mc mb myminio/exprsn-processed --ignore-existing;
      mc anonymous set download myminio/exprsn-processed;
      exit 0;
      "

  # FFmpeg Render Workers - horizontally scalable
  render-worker:
    build:
      context: .
      dockerfile: docker/ffmpeg/Dockerfile
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 512M
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgres://exprsn:exprsn_dev@postgres:5432/exprsn
      - QUEUE_NAME=render-jobs
      - WORKER_CONCURRENCY=2
      - HEALTH_PORT=3100
      - GRACEFUL_SHUTDOWN_TIMEOUT=30000
      - RENDER_OUTPUT_DIR=/data/renders
      - RENDER_TEMP_DIR=/tmp/renders
      - GPU_ENABLED=false
      - DO_SPACES_ENDPOINT=http://minio:9000
      - DO_SPACES_KEY=minioadmin
      - DO_SPACES_SECRET=minioadmin
      - DO_SPACES_BUCKET=exprsn-uploads
      - DO_SPACES_PROCESSED_BUCKET=exprsn-processed
    volumes:
      - render_output:/data/renders
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 15s
      timeout: 10s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # GPU-enabled render worker (optional, requires nvidia-docker)
  render-worker-gpu:
    build:
      context: .
      dockerfile: docker/ffmpeg/Dockerfile
    profiles:
      - gpu
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgres://exprsn:exprsn_dev@postgres:5432/exprsn
      - QUEUE_NAME=render-jobs
      - WORKER_CONCURRENCY=4
      - HEALTH_PORT=3100
      - GRACEFUL_SHUTDOWN_TIMEOUT=60000
      - RENDER_OUTPUT_DIR=/data/renders
      - RENDER_TEMP_DIR=/tmp/renders
      - GPU_ENABLED=true
      - DO_SPACES_ENDPOINT=http://minio:9000
      - DO_SPACES_KEY=minioadmin
      - DO_SPACES_SECRET=minioadmin
      - DO_SPACES_BUCKET=exprsn-uploads
      - DO_SPACES_PROCESSED_BUCKET=exprsn-processed
    volumes:
      - render_output:/data/renders
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 15s
      timeout: 10s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  prefetch-worker:
    build:
      context: .
      dockerfile: docker/prefetch/Dockerfile
    container_name: exprsn-prefetch-worker
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - TIMELINE_SERVICE_URL=http://host.docker.internal:3002
      - PREFETCH_CONCURRENCY=50
      - PREFETCH_DEFAULT_LIMIT=20
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  opensearch_data:
  minio_data:
  render_output:
