apiVersion: v1
kind: Secret
metadata:
  name: exprsn-secrets
  namespace: exprsn
  labels:
    app.kubernetes.io/name: exprsn
type: Opaque
stringData:
  # Database
  DATABASE_USER: "exprsn"
  DATABASE_PASSWORD: "CHANGE_ME_IN_PRODUCTION"

  # JWT Secrets
  JWT_SECRET: "CHANGE_ME_32_CHARS_MINIMUM_RANDOM"
  SESSION_SECRET: "CHANGE_ME_32_CHARS_MINIMUM_RANDOM"

  # Storage Credentials
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "minioadmin"

  # Optional: AWS S3 (if using S3 instead of MinIO)
  # AWS_ACCESS_KEY_ID: ""
  # AWS_SECRET_ACCESS_KEY: ""

  # Optional: SMTP Credentials
  SMTP_USER: ""
  SMTP_PASS: ""

  # Optional: OAuth Client Secrets
  OAUTH_CLIENT_SECRET: ""

  # Admin
  ADMIN_API_KEY: "CHANGE_ME_SECURE_ADMIN_KEY"
